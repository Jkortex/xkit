version: '2'
sql:
  - schema: 'migrations/sqlite'
    queries: 'internal/infrastructure/persistence/sqlite/queries'
    engine: 'sqlite'
    gen:
      go:
        package: 'sldb'
        out: 'internal/infrastructure/persistence/sqlite/db'
        sql_package: 'database/sql'
        emit_interface: true
        emit_json_tags: true
        emit_db_tags: true
